<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preset Preview</title>

<style>
body{
margin:0;
background:#0f0f1a;
font-family:Arial;
color:white;
}

.header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#ff4fd8;
}

.preview{
margin:15px;
height:220px;
background:linear-gradient(135deg,#ff4fd8,#8b5cf6);
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
}

.box{
margin:15px;
background:#1b1b2f;
padding:20px;
border-radius:20px;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.rating{
color:gold;
font-size:22px;
margin-bottom:10px;
}

.price{
font-size:26px;
font-weight:bold;
color:#00ff88;
margin-bottom:15px;
}

.btn{
display:block;
width:100%;
padding:15px;
background:#ff4fd8;
border:none;
border-radius:12px;
color:white;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.drive{
display:block;
text-align:center;
padding:15px;
background:#00c853;
border-radius:12px;
color:white;
text-decoration:none;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
🎬 PRESET PREVIEW
</div>

<div class="preview">
▶️
</div>

<div class="box">

<div class="title">
Love Song Preset
</div>

<div class="rating">
⭐⭐⭐⭐⭐ 5.0
</div>

<div class="price">
₹79
</div>

<button class="btn"
onclick="location.href='payment.html'">
🛒 BUY PRESET
</button>

<a class="drive" href="#">
🔓 DOWNLOAD PRESET
</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KAMU PRESET Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}
.card{
background:#1e293b;
padding:20px;
margin:20px;
border-radius:15px;
}
button{
padding:12px 20px;
background:#06b6d4;
border:none;
color:white;
border-radius:10px;
font-size:18px;
}
</style>
</head>
<body>

<div class="card">
<h1>Welcome To KAMU PRESET</h1>
<p>Account Successfully Created</p>

<button onclick="playMusic()">Play Song</button>

<audio id="song">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function playMusic(){
document.getElementById("song").play();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMU PRESET VIP PAYMENT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b15;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.vip-badge{
text-align:center;
font-size:32px;
font-weight:bold;
margin-top:20px;
background:linear-gradient(90deg,#ff4fd8,#b85cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#bdbdbd;
margin-top:10px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:25px;
margin-bottom:20px;
box-shadow:0 0 25px rgba(255,79,216,.15);
}

.section-title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
text-align:center;
}

.qr{
text-align:center;
}

.qr img{
width:280px;
max-width:100%;
border-radius:20px;
}

.upi-box{
background:#181826;
padding:15px;
border-radius:15px;
text-align:center;
margin-top:20px;
}

.upi-title{
color:#ffd700;
font-size:14px;
}

.upi-id{
font-size:18px;
font-weight:bold;
margin-top:8px;
}

.price{
margin-top:15px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#00ff99;
}

input{
width:100%;
padding:15px;
margin-top:20px;
background:#181826;
border:1px solid #2d2d45;
border-radius:15px;
color:white;
font-size:16px;
}

.verify-btn{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#ff4fd8,#b85cf6);
color:white;
}

.support-btn{
display:block;
text-align:center;
text-decoration:none;
padding:16px;
border-radius:15px;
background:#25D366;
color:white;
font-weight:bold;
margin-top:15px;
}

.notice{
text-align:center;
line-height:30px;
color:#d5d5d5;
}

.footer{
margin-top:25px;
text-align:center;
color:#888;
}
</style>
</head>

<body>

<div class="container">

<div class="vip-badge">
💎 KAMU PRESET VIP
</div>

<div class="subtitle">
Unlock Premium Presets Instantly
</div>

<div class="card">

<div class="section-title">
📱 Scan & Pay
</div>

<div class="qr">
<img src="Screenshot_20260623-162531.png">
</div>

<div class="upi-box">
<div class="upi-title">UPI ID</div>
<div class="upi-id">6294778013-2@ybl</div>
</div>

<div class="price">₹99</div>

<input id="utr" type="text" placeholder="Enter UTR / Transaction ID">

<button class="verify-btn" onclick="submitPayment()">
🚀 VERIFY & UNLOCK PRESET
</button>

</div>

<div class="card">
<div class="section-title">💬 Need Help?</div>

<div class="notice">
WhatsApp Support<br><br>
6294778013
</div>

<a class="support-btn"
href="https://wa.me/916294778013">
CONTACT SUPPORT
</a>

</div>

<div class="footer">
👑 Trusted By KAMU PRESET Users
</div>

</div>

<script>
async function submitPayment(){

const utr=document.getElementById("utr").value.trim();

if(!utr){
alert("Enter UTR Number");
return;
}

try{

const response=await fetch(
"https://script.google.com/macros/s/AKfycbxKziF3v-Ya3jgNnTkx1hpOMXTSBWFGFmSsVZJkp872D220EiGlgbh5xPORqb2gyEUBjQ/exec",
{
method:"POST",
body:JSON.stringify({
action:"payment",
username:"guest",
productid:"VIP001",
amount:"99",
utr:utr
})
}
);

const text = await response.text();
const result = JSON.parse(text);

if(result.success){
alert("✅ Payment Submitted Successfully");
document.getElementById("utr").value="";
}else{
alert(result.message || "Failed");
}

}catch(error){
alert("❌ Server Error");
console.log(error);
}

}
</script>

</body>
</html>

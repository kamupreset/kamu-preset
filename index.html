<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMU PRESET Login</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080812;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow:hidden;
}

.glow1{
position:absolute;
width:250px;
height:250px;
background:#ff4fd8;
filter:blur(120px);
top:-50px;
left:-50px;
opacity:.4;
}

.glow2{
position:absolute;
width:250px;
height:250px;
background:#b85cf6;
filter:blur(120px);
bottom:-50px;
right:-50px;
opacity:.4;
}

.card{
width:100%;
max-width:420px;
background:rgba(27,27,47,.95);
padding:30px;
border-radius:30px;
box-shadow:0 0 35px rgba(255,79,216,.25);
position:relative;
z-index:1;
}

.logo{
font-size:70px;
text-align:center;
margin-bottom:10px;
}

.title{
font-size:38px;
font-weight:bold;
text-align:center;
background:linear-gradient(90deg,#ff4fd8,#b85cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:25px;
}

.input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#111827;
border:none;
border-radius:15px;
color:white;
font-size:16px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.login{
background:linear-gradient(90deg,#ff4fd8,#b85cf6);
color:white;
}

.signup{
background:#00c853;
color:white;
}

.info{
margin-top:25px;
text-align:center;
color:#bbb;
line-height:28px;
}

</style></head><body><div class="glow1"></div>
<div class="glow2"></div><div class="card"><div class="logo">👑</div><div class="title">
KAMU PRESET
</div><div class="subtitle">
Premium Preset Marketplace
</div><input type="text" id="username" class="input" placeholder="Username"><input type="password" id="password" class="input" placeholder="Password"><input type="text" id="whatsapp" class="input" placeholder="WhatsApp Number"><button class="btn login" onclick="loginUser()">
🔐 LOGIN
</button><button class="btn signup" onclick="signupUser()">
✨ CREATE ACCOUNT
</button><div class="info">
💎 Premium Presets<br>
🎬 Photo & Video Presets<br>
🔒 Secure Login
</div></div><script>

const API_URL="https://script.google.com/macros/s/AKfycbxKziF3v-Ya3jgNnTkx1hpOMXTSBWFGFmSsVZJkp872D220EiGlgbh5xPORqb2gyEUBjQ/exec";

async function signupUser(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;
const whatsapp=document.getElementById("whatsapp").value;

if(!username || !password || !whatsapp){
alert("Fill all fields");
return;
}

try{

const response = await fetch(API_URL,{
  method:"POST",
  body:JSON.stringify({
    action:"signup",
    username:username,
    password:password,
    whatsapp:whatsapp
  })
});

const text = await response.text();
const data = JSON.parse(text);

if(data.success){
   alert("Account Created Successfully");
}else{
   alert(data.message || "Signup Failed");
}

}catch(err){

alert("API Error");

}

}

async function loginUser(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

try{

const response=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
username:username,
password:password
})
});

const text = await response.text();
const data = JSON.parse(text);

if(data.success){

localStorage.setItem("username",username);

window.location.href="home.html";

}else{

alert("Wrong Username Or Password");

}

}catch(err){

alert("Server Error");

}

}

</script></body>
</html>

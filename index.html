<!DOCTYPE html>
<html>
<head>
<title>KAMU PRESET</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:#1e293b;
margin:15px;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#06b6d4;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

.product{
background:#111827;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.price{
color:#22c55e;
font-weight:bold;
font-size:18px;
}
</style>
</head>

<body>

<header>
KAMU PRESET
</header>

<div class="card">
<h2>Login</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>
</div>

<div class="card">
<h2>Signup</h2>
<input type="text" placeholder="Username">
<input type="text" placeholder="WhatsApp Number">
<input type="password" placeholder="Password">
<button>Create Account</button>
</div>

<div class="card">
<h2>Premium Presets</h2>

<div class="product">
<h3>Shake Preset</h3>
<div class="price">₹79</div>
<button>Buy Now</button>
</div>

<div class="product">
<h3>Naruto Preset</h3>
<div class="price">₹99</div>
<button>Buy Now</button>
</div>

<div class="product">
<h3>Beat Edit Preset</h3>
<div class="price">₹139</div>
<button>Buy Now</button>
</div>

</div>

</body>
</html>

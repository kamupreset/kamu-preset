<!DOCTYPE html><html>
<head>
<title>KAMU PRESET</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.card{
background:#1e293b;
margin:15px;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#06b6d4;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

.product{
background:#111827;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.price{
color:#22c55e;
font-size:20px;
font-weight:bold;
}
</style></head><body><header>KAMU PRESET</header><div class="card">
<h2>Create Account</h2><input id="username" placeholder="Username">
<input id="whatsapp" placeholder="WhatsApp Number">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>

</div><div class="card">
<h2>Premium Presets</h2><div class="product">
<h3>Shake Preset</h3>
<div class="price">₹79</div>
<button>Buy Now</button>
</div><div class="product">
<h3>Naruto Preset</h3>
<div class="price">₹99</div>
<button>Buy Now</button>
</div><div class="product">
<h3>Beat Edit Preset</h3>
<div class="price">₹139</div>
<button>Buy Now</button>
</div></div><script>
const API_URL="https://script.google.com/macros/s/AKfycbxKziF3v-Ya3jgNnTkx1hpOMXTSBWFGFmSsVZJkp872D220EiGlgbh5xPORqb2gyEUBjQ/exec";

async function signup(){

let username=document.getElementById("username").value;
let whatsapp=document.getElementById("whatsapp").value;
let password=document.getElementById("password").value;

if(!username || !whatsapp || !password){
alert("সব তথ্য পূরণ করুন");
return;
}

try{

let response=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"signup",
username:username,
whatsapp:whatsapp,
password:password
})
});

let data=await response.json();

alert(data.message);

}catch(error){

alert("Signup Failed");

}

}
</script></body>
</html>
